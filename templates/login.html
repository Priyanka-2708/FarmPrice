<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Login — Farmer Market</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    :root{
      --green-deep:#2d4a2d;--green-mid:#4a7c4a;--green-lite:#a8c8a8;
      --gold:#d4a017;--gold-lite:#f0cc6a;--cream:#faf6ee;--warm-white:#fff9f0;
      --earth:#5c3d1e;--rust:#c0522a;--text-dark:#1e1a14;--text-lite:#9a8e7a;
      --shadow-lg:0 16px 48px rgba(92,61,30,.18);--radius:16px;--radius-sm:10px;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{
      font-family:'DM Sans',sans-serif;
      min-height:100vh;
      background:linear-gradient(145deg,var(--green-deep) 0%,#1a3320 60%,#0e2217 100%);
      display:flex;flex-direction:column;align-items:center;justify-content:center;
      padding:20px;
      position:relative;overflow:hidden;
    }
    /* floating bg shapes */
    .bg-shape{position:absolute;border-radius:50%;opacity:.07;pointer-events:none}
    .s1{width:500px;height:500px;background:var(--gold);top:-150px;right:-100px;animation:fl 10s ease-in-out infinite}
    .s2{width:280px;height:280px;background:var(--green-lite);bottom:-80px;left:-60px;animation:fl 13s ease-in-out infinite reverse}
    @keyframes fl{0%,100%{transform:translateY(0)}50%{transform:translateY(-20px)}}

    .login-box{
      background:var(--warm-white);
      border-radius:var(--radius);
      padding:44px 40px 40px;
      width:100%;max-width:420px;
      box-shadow:var(--shadow-lg);
      border:1px solid rgba(212,160,23,.2);
      animation:fadeUp .7s ease both;
      position:relative;z-index:1;
    }
    @keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}

    .login-icon{font-size:3rem;text-align:center;margin-bottom:12px}
    .login-title{
      font-family:'Playfair Display',serif;
      font-size:1.7rem;font-weight:900;
      color:var(--green-deep);text-align:center;
      margin-bottom:4px;
    }
    .login-sub{color:var(--text-lite);font-size:.88rem;text-align:center;margin-bottom:32px}

    .form-group{margin-bottom:18px}
    label{display:block;font-size:.8rem;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--earth);margin-bottom:7px}
    input[type=text],input[type=password]{
      width:100%;
      background:var(--cream);
      border:2px solid var(--green-lite);
      border-radius:var(--radius-sm);
      padding:13px 16px;
      font-family:'DM Sans',sans-serif;
      font-size:.97rem;color:var(--text-dark);
      outline:none;
      transition:border-color .25s,box-shadow .25s;
    }
    input:focus{border-color:var(--green-mid);box-shadow:0 0 0 3px rgba(74,124,74,.15)}

    .btn-login{
      width:100%;margin-top:8px;
      background:linear-gradient(135deg,var(--green-deep),var(--green-mid));
      color:var(--cream);border:none;border-radius:var(--radius-sm);
      padding:14px;
      font-family:'DM Sans',sans-serif;font-size:1rem;font-weight:600;
      cursor:pointer;
      transition:transform .25s,box-shadow .25s;
      box-shadow:0 4px 16px rgba(45,74,45,.35);
    }
    .btn-login:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(45,74,45,.45)}

    .error-msg{
      background:rgba(192,82,42,.1);
      border:1.5px solid rgba(192,82,42,.35);
      border-radius:var(--radius-sm);
      color:var(--rust);padding:11px 14px;
      font-size:.88rem;font-weight:500;
      margin-bottom:18px;
      display:flex;gap:8px;align-items:center;
    }

    .demo-hint{
      margin-top:24px;
      background:rgba(45,74,45,.07);
      border:1px solid rgba(45,74,45,.15);
      border-radius:var(--radius-sm);
      padding:14px 16px;font-size:.82rem;color:var(--text-lite);
    }
    .demo-hint strong{color:var(--green-deep)}
    .demo-hint p{margin-bottom:4px}

    .footer-note{margin-top:28px;color:rgba(168,200,168,.6);font-size:.78rem;text-align:center}
  </style>
</head>
<body>
  <div class="bg-shape s1"></div>
  <div class="bg-shape s2"></div>

  <div class="login-box">
    <div class="login-icon">🌾</div>
    <h1 class="login-title">Farmer Market</h1>
    <p class="login-sub">Price Information System — Sign in to continue</p>

    {% if error %}
    <div class="error-msg">⚠️ {{ error }}</div>
    {% endif %}

    <form method="POST" action="/login">
      <div class="form-group">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" placeholder="Enter your username" required autocomplete="username"/>
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="Enter your password" required autocomplete="current-password"/>
      </div>
      <button type="submit" class="btn-login">🔓 Sign In</button>
    </form>

    <div class="demo-hint">
      <p><strong>Demo Accounts:</strong></p>
      <p>👨‍🌾 Username: <strong>farmer1</strong> &nbsp;|&nbsp; Password: <strong>pass123</strong></p>
      <p>🛠️ Username: <strong>admin</strong> &nbsp;|&nbsp; Password: <strong>admin123</strong></p>
    </div>
  </div>

  <p class="footer-note">🌱 Empowering farmers with transparent market data</p>
</body>
</html>
